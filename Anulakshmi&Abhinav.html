<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph / Social Media Preview -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourusername.github.io/wedding-card/Anulakshmi&Abhinav.html"> <!-- Replace with your hosted URL -->
    <meta property="og:title" content="Anulakshmi & Abhinav - Wedding Invitation">
    <meta property="og:description" content="Join us for our wedding celebration on May 10, 2026 at 10:30 AM. Click to view the full invitation!">
    <meta property="og:image" content="https://yourusername.github.io/wedding-card/background1.png"> <!-- Preview image from your hero background -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yourusername.github.io/wedding-card/Anulakshmi&Abhinav.html">
    <meta property="twitter:title" content="Anulakshmi & Abhinav - Wedding Invitation">
    <meta property="twitter:description" content="Join us for our wedding celebration on May 10, 2026 at 10:30 AM. Click to view the full invitation!">
    <meta property="twitter:image" content="https://yourusername.github.io/wedding-card/background1.png">
    
    <title>Anulakshmi & Abhinav | Our Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #c5a47e; 
            --bg-pastel: #f9f7f2;
            --text-dark: #4a4a4a;
            --white: #ffffff;
            --serif: 'Cormorant Garamond', serif;
            --script: 'Great Vibes', cursive;
            --sans: 'Montserrat', sans-serif;
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-pastel);
            color: var(--text-dark);
            font-family: var(--serif);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            color: var(--white);
        }

        .hero-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=2070') no-repeat center center/cover;
            filter: blur(2px);
            z-index: -1;
        }

        .hero-content {
            padding: 20px 20px 80px 20px; /* Added bottom padding to clear the arrow */
            max-width: 800px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .tagline {
            font-family: var(--script);
            font-size: clamp(4rem, 12vw, 7rem);
            line-height: 1;
            margin-bottom: 5px;
            opacity: 0;
            animation: revealUp 1.2s var(--transition-smooth) forwards 0.3s;
        }

        .tagline-sub {
            font-family: var(--sans);
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInLetter 2s ease forwards 1s;
        }

        .hero-name-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 1.2s;
        }

        .hero-name-large {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 500;
            letter-spacing: 0.25em;
            line-height: 1.2;
        }

        .hero-name-connector {
            font-family: var(--script);
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            color: var(--primary);
            line-height: 0.8;
            margin: 5px 0;
        }

        .hero-copy {
            font-family: var(--serif);
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 1.5s;
        }

        /* --- Date & Time Layout --- */
        .date-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0;
            animation: revealUp 1.2s var(--transition-smooth) forwards 1.8s;
        }

        .date-month {
            font-family: var(--serif);
            font-size: 1.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .date-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .date-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .date-line {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            margin: 8px 0;
        }

        .date-text {
            font-family: var(--serif);
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .date-center {
            font-family: var(--serif);
            font-size: 4.5rem;
            font-weight: 400;
            line-height: 0.9;
        }

        .date-year {
            font-family: var(--serif);
            font-size: 1.8rem;
            letter-spacing: 0.4em;
            margin-top: 5px;
        }

        .address-main {
            margin-top: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 2.2s;
        }

        /* --- Scroll Arrow --- */
        .scroll-arrow {
            position: absolute;
            bottom: 20px; /* Adjusted slightly lower */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            animation: bounce 2s infinite, fadeIn 2s ease forwards 3s;
            opacity: 0;
            color: var(--white);
            padding: 10px;
            transition: all 0.3s ease;
        }

        .scroll-arrow:hover {
            color: var(--primary);
            transform: translateX(-50%) scale(1.1);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* --- Details Section --- */
        .section {
            padding: 100px 20px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        h2 {
            font-family: var(--script);
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 30px;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }

        .countdown-item {
            background: white;
            padding: 20px;
            min-width: 100px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .countdown-number {
            display: block;
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 300;
        }

        .countdown-label {
            font-family: var(--sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        .qr-container {
            margin: 40px auto;
            padding: 20px;
            background: white;
            width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 10px;
        }

        .music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 164, 126, 0.3);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: all 0.4s var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .music-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .music-toggle svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        /* --- Animations --- */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInLetter {
            from { opacity: 0; letter-spacing: 0.1em; }
            to { opacity: 1; letter-spacing: 0.4em; }
        }

        @media (max-width: 600px) {
            .hero-content { padding-bottom: 100px; } /* Extra space for mobile viewports */
            .date-center { font-size: 3.5rem; }
            .date-side { min-width: 90px; }
            .date-text { font-size: 0.8rem; }
            .date-month, .date-year { font-size: 1.4rem; }
            .hero-name-large { font-size: 1.8rem; }
            #countdown { gap: 10px; }
            .countdown-item { min-width: 70px; padding: 15px 5px; }
            .music-toggle { bottom: 20px; right: 20px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <button class="music-toggle" onclick="toggleMusic()" id="musicBtn" aria-label="Toggle Music">
        <svg id="musicIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        </svg>
    </button>

    <section class="hero" id="home">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1 class="tagline">We Do</h1>
            <p class="tagline-sub">With Joyful Hearts</p>
            
            <div class="hero-name-group">
                <span class="hero-name-large">ANULAKSHMI</span>
                <span class="hero-name-connector">&</span>
                <span class="hero-name-large">ABHINAV</span>
            </div>
            
            <p class="hero-copy">Invite you to their wedding celebration</p>

            <div class="date-section">
                <div class="date-month">MAY</div>
                <div class="date-grid">
                    <div class="date-side">
                        <div class="date-line"></div>
                        <span class="date-text">SUNDAY</span>
                        <div class="date-line"></div>
                    </div>
                    <div class="date-center">03</div>
                    <div class="date-side">
                        <div class="date-line"></div>
                        <span class="date-text">AT 10:30 AM</span>
                        <div class="date-line"></div>
                    </div>
                </div>
                <div class="date-year">2026</div>
            </div>

            <p class="address-main">
                Sreemoolanagaram Vijayan Hall<br>
                Aluva, Ernakulam
            </p>
        </div>
        
        <div class="scroll-arrow" onclick="scrollToDetails()">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </section>

    <section class="section" id="details">
        <h2 data-aos="fade-up">The Countdown</h2>
        <div id="countdown" data-aos="fade-up" data-aos-delay="200">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hrs</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="mins">00</span>
                <span class="countdown-label">Mins</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="secs">00</span>
                <span class="countdown-label">Secs</span>
            </div>
        </div>

        <div data-aos="fade-up" style="margin-top: 60px;">
            <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 15px;">Venue Location</p>
            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://maps.google.com" alt="Location QR" style="width: 100%; display: block;">
            </div>
            <p style="font-family: var(--sans); font-size: 0.7rem; color: #999;">SCAN FOR DIRECTIONS</p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true });

        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicIcon = document.getElementById('musicIcon');

        const pauseIconPath = `
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
        `;
        const musicIconPath = `
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        `;

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicIcon.innerHTML = pauseIconPath;
            } else {
                music.pause();
                musicIcon.innerHTML = musicIconPath;
            }
        }

        function scrollToDetails() {
            document.getElementById('details').scrollIntoView({ behavior: 'smooth' });
        }

        const weddingDate = new Date("May 03, 2026 10:30:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            if (diff > 0) {
                document.getElementById("days").innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                document.getElementById("hours").innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById("mins").innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById("secs").innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            }
        }, 1000);
    </script>
</body>
</html>
